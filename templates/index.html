{% extends "base.html" %}

{% block title %}JobScout - Find Your Next Opportunity{% endblock %}

{% block content %}
<div class="hero-section text-center py-5">
    <h1 class="display-4 fw-bold mb-3">Find Your Next Opportunity</h1>
    <p class="lead text-muted mb-4">Search thousands of jobs from LinkedIn, Indeed, Glassdoor and more — all in one place.</p>

    <form action="/search" method="GET" class="search-form mx-auto" style="max-width: 800px;">
        <div class="row g-3">
            <div class="col-md-5">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" name="query"
                           placeholder="Job title, keyword, or company" required>
                </div>
            </div>
            <div class="col-md-4">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" class="form-control" name="location"
                           placeholder="City, state, or remote">
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-search me-1"></i>Search Jobs
                </button>
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-4">
                <select class="form-select" name="employment_type">
                    <option value="">All Job Types</option>
                    <option value="FULLTIME">Full-time</option>
                    <option value="PARTTIME">Part-time</option>
                    <option value="CONTRACTOR">Contract</option>
                    <option value="INTERN">Internship</option>
                </select>
            </div>
            <div class="col-md-4">
                <select class="form-select" name="date_posted">
                    <option value="all">Any Time</option>
                    <option value="today">Past 24 Hours</option>
                    <option value="3days">Past 3 Days</option>
                    <option value="week">Past Week</option>
                    <option value="month">Past Month</option>
                </select>
            </div>
            <div class="col-md-4">
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" name="remote_only" value="true" id="remoteToggle">
                    <label class="form-check-label" for="remoteToggle">Remote Only</label>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
