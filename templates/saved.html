{% extends "base.html" %}

{% block title %}Saved Jobs - JobScout{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bookmark-fill me-2"></i>Saved Jobs</h2>
    <button class="btn btn-outline-danger btn-sm" id="clearAllBtn" style="display:none;">
        <i class="bi bi-trash me-1"></i>Clear All
    </button>
</div>

<div id="savedJobsList">
    <div class="text-center py-5" id="emptyState">
        <i class="bi bi-bookmark display-1 text-muted"></i>
        <h4 class="mt-3">No saved jobs yet</h4>
        <p class="text-muted">Search for jobs and click the bookmark icon to save them here.</p>
        <a href="/" class="btn btn-primary">Start Searching</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    renderSavedJobs();

    document.getElementById('clearAllBtn').addEventListener('click', function() {
        if (confirm('Remove all saved jobs?')) {
            localStorage.removeItem('savedJobs');
            renderSavedJobs();
            updateSavedCount();
        }
    });
});

function renderSavedJobs() {
    const saved = JSON.parse(localStorage.getItem('savedJobs') || '{}');
    const container = document.getElementById('savedJobsList');
    const emptyState = document.getElementById('emptyState');
    const clearBtn = document.getElementById('clearAllBtn');
    const keys = Object.keys(saved);

    if (keys.length === 0) {
        emptyState.style.display = '';
        clearBtn.style.display = 'none';
        container.querySelectorAll('.job-card').forEach(c => c.remove());
        return;
    }

    emptyState.style.display = 'none';
    clearBtn.style.display = '';

    container.querySelectorAll('.job-card').forEach(c => c.remove());

    keys.forEach(function(jobId) {
        const job = saved[jobId];
        const card = document.createElement('div');
        card.className = 'card job-card mb-3 shadow-sm';
        card.innerHTML = `
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h5 class="card-title mb-1">
                            <a href="/job/${encodeURIComponent(job.job_id)}" class="text-decoration-none">
                                ${escapeHtml(job.job_title)}
                            </a>
                        </h5>
                        <p class="text-muted mb-1">
                            <strong>${escapeHtml(job.employer_name)}</strong>
                            ${job.job_city ? `<span class="ms-2"><i class="bi bi-geo-alt"></i> ${escapeHtml(job.job_city)}${job.job_state ? ', ' + escapeHtml(job.job_state) : ''}</span>` : ''}
                        </p>
                        <div class="d-flex flex-wrap gap-2">
                            ${job.job_employment_type ? `<span class="badge bg-primary-subtle text-primary">${escapeHtml(job.job_employment_type)}</span>` : ''}
                            ${job.job_is_remote ? '<span class="badge bg-success-subtle text-success"><i class="bi bi-wifi"></i> Remote</span>' : ''}
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-danger btn-sm remove-saved-btn" data-job-id="${escapeHtml(job.job_id)}" title="Remove">
                            <i class="bi bi-trash"></i>
                        </button>
                        ${job.job_apply_link ? `<a href="${escapeHtml(job.job_apply_link)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-success" title="Apply"><i class="bi bi-box-arrow-up-right"></i></a>` : ''}
                    </div>
                </div>
            </div>
        `;
        container.appendChild(card);

        card.querySelector('.remove-saved-btn').addEventListener('click', function() {
            delete saved[jobId];
            localStorage.setItem('savedJobs', JSON.stringify(saved));
            renderSavedJobs();
            updateSavedCount();
        });
    });
}
</script>
{% endblock %}
